<!DOCTYPE html>
<html>
<head>
<title>Division Calculator</title>
</head>
<body>

<h3>Enter Marks of 8 Subjects</h3>

<input type="number" id="m1"><br><br>
<input type="number" id="m2"><br><br>
<input type="number" id="m3"><br><br>
<input type="number" id="m4"><br><br>
<input type="number" id="m5"><br><br>
<input type="number" id="m6"><br><br>
<input type="number" id="m7"><br><br>
<input type="number" id="m8"><br><br>

<button onclick="checkResult()">Check Result</button>
<h3 id="result"></h3>

<script>
function checkResult(){

let m1 = Number(document.getElementById("m1").value);
let m2 = Number(document.getElementById("m2").value);
let m3 = Number(document.getElementById("m3").value);
let m4 = Number(document.getElementById("m4").value);
let m5 = Number(document.getElementById("m5").value);
let m6 = Number(document.getElementById("m6").value);
let m7 = Number(document.getElementById("m7").value);
let m8 = Number(document.getElementById("m8").value);

let total = m1 + m2 + m3 + m4 + m5 + m6 + m7 + m8;

let division;

if(total >= 700){
division = "Distinction";
document.getElementById("result").innerHTML = "Total Marks = ";
document.getElementById("result").style.color = "green";
}
else if(total >= 600){
division = "First Division";
}
else if(total >= 500){
division = "Second Division";
}
else if(total >= 400){
division = "Third Division";
}
else{
division = "Fail";
document.getElementById("result").innerHTML = "Total Marks = ";
document.getElementById("result").style.color = "red";
}

document.getElementById("result").innerHTML = "Total Marks = " + total + "<br>Result: " + division;

}
</script>

</body>
</html>
