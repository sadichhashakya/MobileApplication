<!DOCTYPE html>
<html>

<head>
    <title>Simple Calculator</title>
</head>

<body>

    <h2>Simple Calculator</h2>

    <input type="number" id="m1" placeholder="Enter First Number">
    <br><br>

    <input type="number" id="m2" placeholder="Enter Second Number">
    <br><br>

    <button onclick="Calculate('+')">Addition</button>
    <button onclick="Calculate('-')">Subtraction</button>
    <button onclick="Calculate('*')">Multiplication</button>
    <button onclick="Calculate('/')">Division</button>

    <h3 id="result"></h3>

    <script>

        function Calculate(type) {

            let a = Number(document.getElementById("m1").value);
            let b = Number(document.getElementById("m2").value);

            let result;

            if (type == "+")
                result = a + b;

            else if (type == "-")
                result = a - b;

            else if (type == "*")
                result = a * b;

            else if (type == "/")
                result = a / b;

            document.getElementById("result").innerHTML =
                "Result = " + result;
        }

    </script>

</body>

</html>
